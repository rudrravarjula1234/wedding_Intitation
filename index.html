<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rajesh &amp; Sri Kruthi — Wedding Invitation</title>
<meta name="description" content="With the blessings of our families, we invite you to celebrate our wedding." />

<!-- ================================================================= -->
<!--  EDIT YOUR DETAILS HERE — this is the only part you need to touch. -->
<!--  To use real photos later: put image files next to this page       -->
<!--  (e.g. an "images" folder) and set the paths in `images` below,     -->
<!--  like  hero: "images/couple.jpg".  While blank, Ghibli-style        -->
<!--  artwork is shown as a placeholder.                                 -->
<!-- ================================================================= -->
<script>
const CONFIG = {
  groom: "Rajesh Rudravarjula",
  bride: "Sri Kruthi Pokunuri",
  intro: "Together with our families",
  invite: "request the honour of your presence as we begin our journey together",
  hashtag: "RajeshWedsSriKruthi",
  // Countdown points to the wedding ceremony
  countdownTo: "2026-07-05T06:29:00",
  events: [
    {
      label: "The Wedding",
      sub: "పెళ్లి · Pelli",
      date: "2026-07-05",   // 5 July 2026 (DD/MM)
      time: "06:29",        // 6:29 AM muhurtam
      venue: "Simba Resort",
      city: "Visakhapatnam",
      maps: "https://maps.app.goo.gl/UdxCjvDdrS3TcL518",
      durationHours: 4,
      scene: "dawn",
      image: ""   // optional: "images/wedding.jpg"
    },
    {
      label: "The Reception",
      sub: "రిసెప్షన్ · Reception",
      date: "2026-08-11",   // 11 August 2026 (DD/MM)
      time: "19:00",        // 7:00 PM
      venue: "Shubha Grand",
      city: "Hyderabad",
      maps: "https://maps.app.goo.gl/9fQ4mWJiTDAevimb9",
      durationHours: 4,
      scene: "dusk",
      image: ""   // optional: "images/reception.jpg"
    }
  ],
  images: { hero: "", closing: "" }   // optional photo overrides for the top & bottom scenes
};
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --gold: #c79a52; --gold-soft: #e7cf9c;
    --ink: #2a2622; --paper: #fbf6ee;
    --card: rgba(255,253,248,0.86);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: "Jost", -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink);
    background: var(--paper); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  .serif { font-family: "Cormorant Garamond", Georgia, serif; }

  /* full-bleed scenic panels */
  .panel { position: relative; min-height: 100vh; min-height: 100svh; display: flex;
    align-items: center; justify-content: center; text-align: center; padding: 48px 22px; overflow: hidden; }
  .panel__scene { position: absolute; inset: 0; z-index: 0; }
  .panel__scene svg, .panel__scene img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .panel__scene.kb svg, .panel__scene.kb img { animation: kb 26s ease-in-out infinite alternate; }
  @keyframes kb { from { transform: scale(1.06); } to { transform: scale(1.16); } }
  .panel__content { position: relative; z-index: 2; max-width: 720px; width: 100%;
    animation: rise 1.3s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }

  .eyebrow { font-size: 12px; letter-spacing: 0.4em; text-transform: uppercase; color: #7a5b2c; margin-bottom: 22px; }
  .names { font-weight: 400; line-height: 1.0; letter-spacing: 0.5px; color: #4a3a26;
    font-size: clamp(46px, 12vw, 104px); text-shadow: 0 2px 18px rgba(255,255,255,0.45); }
  .amp { display: block; font-style: italic; color: var(--gold); font-size: clamp(26px, 6vw, 50px); margin: 4px 0; }
  .invite-line { margin: 24px auto 0; max-width: 440px; font-size: clamp(13px, 3.4vw, 16px);
    letter-spacing: 0.06em; color: #5c4a33; line-height: 1.7; }
  .hero__date { margin-top: 26px; font-size: clamp(17px, 4.6vw, 24px); letter-spacing: 0.18em; color: #4a3a26; }
  .scroll-hint { position: absolute; bottom: 20px; left: 0; right: 0; z-index: 2; text-align: center;
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #6b5430; animation: bob 2.4s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

  /* countdown */
  .countdown { display: flex; gap: clamp(12px, 5vw, 36px); justify-content: center; margin-top: 34px; }
  .cd b { display: block; font-family: "Cormorant Garamond", serif; font-weight: 600;
    font-size: clamp(28px, 7vw, 48px); color: #6b4f24; line-height: 1; }
  .cd span { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #7a5b2c; }

  /* event card overlaid on a scene */
  .event-card { background: var(--card); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(199,154,82,0.35); border-radius: 18px; padding: clamp(30px, 6vw, 48px);
    box-shadow: 0 24px 60px -22px rgba(74,58,38,0.5); max-width: 480px; margin: 0 auto; }
  .event-card .kicker { font-size: 11px; letter-spacing: 0.36em; text-transform: uppercase; color: var(--gold); }
  .event-card .sub { font-family: "Cormorant Garamond", serif; font-style: italic; color: #8a6a3a; font-size: 20px; margin-top: 6px; }
  .event-card h2 { font-family: "Cormorant Garamond", serif; font-weight: 500; font-size: clamp(30px, 7vw, 46px); margin: 6px 0 18px; }
  .ec-line { font-size: clamp(15px, 4vw, 18px); line-height: 1.6; }
  .ec-when { font-weight: 500; color: #4a3a26; }
  .ec-venue { color: #6b5b45; margin-top: 6px; letter-spacing: 0.02em; }
  .divider { width: 54px; height: 1px; background: var(--gold); margin: 20px auto; opacity: 0.7; }
  .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 22px; }
  .btn { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-size: 12px;
    letter-spacing: 0.14em; text-transform: uppercase; padding: 13px 22px; border-radius: 3px; transition: transform .15s, background .2s; }
  .btn-gold { background: var(--gold); color: #fff; font-weight: 500; }
  .btn-gold:hover { transform: translateY(-2px); background: #b9893f; }
  .btn-ghost { border: 1px solid rgba(199,154,82,0.6); color: #8a6a3a; }
  .btn-ghost:hover { transform: translateY(-2px); background: rgba(199,154,82,0.12); }

  footer { text-align: center; padding: 40px 20px 50px; color: #8a7a62; font-size: 12px; letter-spacing: 0.22em; }
  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .9s ease, transform .9s cubic-bezier(.2,.8,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
</style>
</head>
<body>

  <!-- HERO -->
  <header class="panel">
    <div class="panel__scene kb" data-scene="dawn" id="heroScene"></div>
    <div class="panel__content">
      <p class="eyebrow" id="intro"></p>
      <h1 class="serif names"><span id="g"></span><span class="amp">&amp;</span><span id="b"></span></h1>
      <p class="invite-line" id="invite"></p>
      <p class="hero__date serif" id="heroDate"></p>
      <div class="countdown" id="countdown"></div>
    </div>
    <div class="scroll-hint">Scroll</div>
  </header>

  <!-- EVENTS render here -->
  <main id="events"></main>

  <!-- CLOSING -->
  <section class="panel">
    <div class="panel__scene" data-scene="dusk" id="closingScene"></div>
    <div class="panel__content">
      <p class="eyebrow">With love &amp; blessings</p>
      <h2 class="serif names"><span id="g2"></span><span class="amp">&amp;</span><span id="b2"></span></h2>
      <p class="invite-line">We can't wait to celebrate with you.</p>
    </div>
  </section>
  <footer id="footer"></footer>

<script>
/* ---------- Ghibli-style placeholder scenery (hand-drawn SVG) ---------- */
function scene(kind) {
  if (kind === 'dusk') {
    return `<svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="duskSky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#2b2a52"/><stop offset="0.45" stop-color="#6b4a76"/>
          <stop offset="0.72" stop-color="#cc6f73"/><stop offset="1" stop-color="#f4b06a"/>
        </linearGradient>
        <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#fff7e6"/><stop offset="0.7" stop-color="#ffeec9"/><stop offset="1" stop-color="#ffeec9" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1200" height="800" fill="url(#duskSky)"/>
      <g fill="#fff" opacity="0.85">
        <circle cx="180" cy="120" r="2"/><circle cx="320" cy="80" r="1.6"/><circle cx="500" cy="140" r="1.8"/>
        <circle cx="760" cy="90" r="2.2"/><circle cx="980" cy="150" r="1.6"/><circle cx="1080" cy="70" r="2"/>
        <circle cx="240" cy="220" r="1.4"/><circle cx="640" cy="40" r="1.4"/><circle cx="860" cy="200" r="1.5"/>
      </g>
      <circle cx="900" cy="250" r="150" fill="url(#moon)"/>
      <circle cx="900" cy="250" r="62" fill="#fff7e6"/>
      <g fill="#ffffff" opacity="0.5">
        <ellipse cx="300" cy="330" rx="150" ry="28"/><ellipse cx="430" cy="350" rx="120" ry="24"/>
        <ellipse cx="820" cy="400" rx="170" ry="26"/>
      </g>
      <path d="M0 560 Q 200 500 420 545 T 820 540 T 1200 560 V800 H0 Z" fill="#7a5a78"/>
      <path d="M0 630 Q 260 570 540 615 T 1000 612 T 1200 632 V800 H0 Z" fill="#4a3a5e"/>
      <path d="M0 710 Q 320 660 660 700 T 1200 706 V800 H0 Z" fill="#2e2742"/>
    </svg>`;
  }
  // dawn (default)
  return `<svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="dawnSky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#bfe4ff"/><stop offset="0.45" stop-color="#ffe9cf"/>
        <stop offset="0.78" stop-color="#ffd3ad"/><stop offset="1" stop-color="#f7c39b"/>
      </linearGradient>
      <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#fffaf0"/><stop offset="0.6" stop-color="#ffe9b8"/><stop offset="1" stop-color="#ffe9b8" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="1200" height="800" fill="url(#dawnSky)"/>
    <circle cx="600" cy="430" r="300" fill="url(#sun)"/>
    <circle cx="600" cy="440" r="92" fill="#fff6dc"/>
    <g fill="#ffffff" opacity="0.9">
      <ellipse cx="230" cy="180" rx="120" ry="34"/><ellipse cx="320" cy="200" rx="90" ry="26"/>
      <ellipse cx="930" cy="150" rx="140" ry="36"/><ellipse cx="1030" cy="172" rx="95" ry="26"/>
      <ellipse cx="640" cy="120" rx="80" ry="22" opacity="0.7"/>
    </g>
    <g stroke="#6b5b45" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round">
      <path d="M150 300 q 14 -14 28 0"/><path d="M196 300 q 14 -14 28 0"/>
      <path d="M980 250 q 12 -12 24 0"/><path d="M1018 250 q 12 -12 24 0"/>
    </g>
    <path d="M0 580 Q 220 520 460 562 T 880 558 T 1200 580 V800 H0 Z" fill="#9cc79a"/>
    <path d="M0 650 Q 280 595 580 636 T 1040 632 T 1200 652 V800 H0 Z" fill="#6fae7e"/>
    <path d="M0 724 Q 340 676 700 716 T 1200 720 V800 H0 Z" fill="#4f8a64"/>
  </svg>`;
}

(function () {
  const C = CONFIG, $ = id => document.getElementById(id);
  $('g').textContent = $('g2').textContent = C.groom;
  $('b').textContent = $('b2').textContent = C.bride;
  $('intro').textContent = C.intro || '';
  $('invite').textContent = C.invite || '';
  document.title = C.groom + ' & ' + C.bride + ' — Wedding Invitation';

  // place hero / closing scenes (photo overrides if provided)
  function fillScene(el, kind, img) {
    if (img) el.innerHTML = "<img src='" + img + "' alt='' />";
    else el.innerHTML = scene(kind);
  }
  fillScene($('heroScene'), 'dawn', C.images && C.images.hero);
  fillScene($('closingScene'), 'dusk', C.images && C.images.closing);

  function fmtDateLong(d) { return d.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); }
  function fmtDateShort(d) { return d.toLocaleDateString(undefined, { day: 'numeric', month: 'long', year: 'numeric' }); }
  function fmtTime(t) { if (!t) return ''; const [h, m] = t.split(':').map(Number); const ap = h >= 12 ? 'PM' : 'AM'; return (((h + 11) % 12) + 1) + ':' + String(m || 0).padStart(2, '0') + ' ' + ap; }
  function gcal(ev, start) {
    const end = new Date(start.getTime() + (ev.durationHours || 3) * 3600000);
    const pad = n => String(n).padStart(2, '0');
    const f = d => d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + 'T' + pad(d.getHours()) + pad(d.getMinutes()) + '00';
    const p = new URLSearchParams({ action: 'TEMPLATE',
      text: C.groom + ' & ' + C.bride + ' — ' + ev.label,
      dates: f(start) + '/' + f(end),
      details: 'With our families, we joyfully invite you.',
      location: ev.venue + ', ' + ev.city });
    return 'https://www.google.com/calendar/render?' + p.toString();
  }

  // wedding date for the hero line + countdown
  const wed = C.events[0];
  const wedStart = new Date(wed.date + 'T' + wed.time + ':00');
  $('heroDate').textContent = fmtDateShort(wedStart);

  // render event panels
  const host = $('events');
  C.events.forEach(ev => {
    const start = new Date(ev.date + 'T' + (ev.time || '00:00') + ':00');
    const sec = document.createElement('section');
    sec.className = 'panel';
    sec.innerHTML =
      "<div class='panel__scene' data-scene='" + ev.scene + "'></div>" +
      "<div class='panel__content reveal'>" +
        "<div class='event-card'>" +
          "<p class='kicker'>" + ev.label + "</p>" +
          (ev.sub ? "<p class='sub'>" + ev.sub + "</p>" : "") +
          "<h2 class='serif'>" + C.groom.split(' ')[0] + " &amp; " + C.bride.split(' ')[0] + "</h2>" +
          "<p class='ec-line ec-when'>" + fmtDateLong(start) + "<br>" + fmtTime(ev.time) + "</p>" +
          "<div class='divider'></div>" +
          "<p class='ec-line ec-venue'><strong>" + ev.venue + "</strong><br>" + ev.city + "</p>" +
          "<div class='actions'>" +
            (ev.maps ? "<a class='btn btn-gold' target='_blank' rel='noopener' href='" + ev.maps + "'>Open in Maps</a>" : "") +
            "<a class='btn btn-ghost' target='_blank' rel='noopener' href='" + gcal(ev, start) + "'>Add to Calendar</a>" +
          "</div>" +
        "</div>" +
      "</div>";
    host.appendChild(sec);
    fillScene(sec.querySelector('.panel__scene'), ev.scene, ev.image);
  });

  // countdown to the wedding
  const cd = $('countdown');
  const target = new Date(C.countdownTo);
  function tick() {
    if (isNaN(target)) { cd.style.display = 'none'; return; }
    let diff = Math.max(0, target - new Date());
    const d = Math.floor(diff / 86400000); diff -= d * 86400000;
    const h = Math.floor(diff / 3600000); diff -= h * 3600000;
    const m = Math.floor(diff / 60000); diff -= m * 60000;
    const s = Math.floor(diff / 1000);
    cd.innerHTML = [['Days', d], ['Hours', h], ['Mins', m], ['Secs', s]]
      .map(p => "<div class='cd'><b>" + String(p[1]).padStart(2, '0') + "</b><span>" + p[0] + "</span></div>").join('');
  }
  tick(); setInterval(tick, 1000);

  // scroll reveal
  const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }), { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  $('footer').textContent = '#' + (C.hashtag || (C.groom + 'And' + C.bride));
})();
</script>
</body>
</html>
